<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traced — Shopify</title>
    <!-- Shopify App Bridge (CDN) — MUST be the first script.
         Reads the shopify-api-key meta tag and establishes the postMessage
         handshake with the Shopify admin parent frame before React mounts.
         The meta tag content is substituted by Vite at build time from the
         VITE_SHOPIFY_API_KEY environment variable. -->
    <meta name="shopify-api-key" content="%VITE_SHOPIFY_API_KEY%" />
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <script type="module" crossorigin src="/assets/embedded-CuvtQ1kq.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/client-DlaJEBil.js">
    <link rel="stylesheet" crossorigin href="/assets/embedded-Cg-8NA1P.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
