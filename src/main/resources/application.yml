spring:
  application:
    name: traceability

  # App datasource — connects as app_user so RLS is always enforced.
  # In production set APP_DB_USER=app_user and APP_DB_PASSWORD via env.
  # Locally docker-compose runs as postgres (acceptable; RLS still fires via GUC).
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/traceability}
    username: ${APP_DB_USER:postgres}
    password: ${APP_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 5000

  # Flyway uses owner credentials (DDL + role creation requires more than app_user has).
  # spring.flyway.url being present makes Spring Boot create a separate internal datasource
  # for Flyway — the TenantAwareDataSource primary bean is NOT used by Flyway.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    # V15 (shopify_webhook_events) was never committed while V16-V30 were — it must be applied
    # after its successors already exist in schema_history.  out-of-order=true lets Flyway
    # apply the gap without failing the version-sequence check.
    out-of-order: true
    url: ${FLYWAY_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/traceability}}
    user: ${FLYWAY_DB_USER:postgres}
    password: ${FLYWAY_DB_PASSWORD:postgres}

server:
  port: ${PORT:8080}
  # Honor X-Forwarded-Proto / X-Forwarded-Host from nginx so Spring builds redirect URLs
  # with the external https:// scheme instead of the internal http:// scheme used on the
  # Docker-internal network between nginx and the app container.  Without this, Spring's
  # redirect:/auth/shopify/install produces Location: http://... which Shopify refuses to
  # follow, breaking dashboard-initiated installs.
  forward-headers-strategy: framework

app:
  jwt:
    # MUST be overridden in production via JWT_SECRET env var (base64, ≥32 bytes).
    secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LW5ldmVyLXVzZS1pbi1wcm9kdWN0aW9uLTMyYg==}
    access-token-minutes: 30
    refresh-token-days: 30
  # AES-256-GCM envelope key for encrypting store access tokens at rest.
  # MUST be set in production via APP_ENCRYPTION_KEY env var (base64, exactly 32 bytes).
  encryption-key: ${APP_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  # Feature flag: enable the temporary custom-app connect path (DEV/pilot only).
  # Set CUSTOM_APP_CONNECT_ENABLED=true in .env to activate.
  custom-app-connect-enabled: ${CUSTOM_APP_CONNECT_ENABLED:false}

shopify:
  # Pin the API version — never use "latest" in code paths.
  api-version: ${SHOPIFY_API_VERSION:2026-04}
  # Public OAuth app credentials (set via env in production).
  client-id: ${SHOPIFY_CLIENT_ID:dev-client-id}
  client-secret: ${SHOPIFY_CLIENT_SECRET:dev-client-secret-development-ok!!}
  scopes: read_products,read_orders,read_fulfillments,read_customers
  redirect-uri: ${SHOPIFY_REDIRECT_URI:http://localhost:8080/auth/shopify/callback}
  app-url: ${SHOPIFY_APP_URL:http://localhost:5173}
  # Base URL for webhook callback registration (must be the backend server URL, not the SPA).
  webhook-base-url: ${SHOPIFY_WEBHOOK_BASE_URL:http://localhost:8080}

bosta:
  # Base URL: prod=https://app.bosta.co, staging=https://stg-app.bosta.co
  base-url: ${BOSTA_BASE_URL:https://app.bosta.co}
  api-version: v0
  backfill:
    max-pages: 20           # page cap per run (20 × page-size deliveries max)
    page-size: 50
    inter-fetch-delay-ms: 100   # throttle between per-delivery fetches (no documented rate limit)
    default-lookback-days: 90   # reserved; not used for filtering in v1
  poll:
    # Tier 1 — Status poll: fetches every known in-flight shipment by tracking number.
    # Keeps current state without relying on the Bosta list order.
    status-enabled: true
    status-interval-minutes: 3   # cron hardcoded as */3 * * * * in BostaStatusPollJob
    status-max-per-cycle: 200    # cap; rotation via last_polled_at ensures no starvation
    # Tier 2 — Discovery poll: pages Bosta list for new deliveries not yet ingested.
    discovery-enabled: true
    discovery-interval-minutes: 20   # cron hardcoded as */20 * * * * in BostaDiscoveryPollJob
    discovery-pages: 3               # first 3 pages (~150 newest-created deliveries)
    # Shared throttle (reused from backfill — same Bosta rate-limit concern).
    inter-fetch-delay-ms: 100
    # Rate-limit math (per tenant per hour):
    #   Tier 1: 20 cycles/hr × ~tens of fetches = ~100–400 API calls/hr (pilot scale)
    #   Tier 2: 3 cycles/hr × (3 list calls + ~50 fetch calls) = ~159 API calls/hr
    #   Total: ~260–560 API calls/hr/tenant — well within Bosta's undocumented limits

org:
  jobrunr:
    background-job-server:
      enabled: true
    # skip-create=true prevents the Spring Boot auto-config StorageProvider from running DDL.
    # Our custom JobRunrConfig @Bean creates PostgresStorageProvider(ownerDs) directly, which
    # ignores this property. V18 Flyway migration creates all JobRunr tables and pre-populates
    # jobrunr_migrations so DatabaseCreator finds them applied and does nothing on startup.
    database:
      skip-create: true

logging:
  level:
    com.traceability: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %5p [%X{requestId:--}] %logger{36} : %m%n%wEx"

# Sentry error tracking (NFR-6).
# Set SENTRY_DSN env var in production; leave unset locally/in tests (disables Sentry).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.0
  environment: ${SENTRY_ENVIRONMENT:production}
  send-default-pii: false
