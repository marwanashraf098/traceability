# Disable the JobRunr background job server in tests.
# Jobs are called directly as Java methods in integration tests.
org.jobrunr.background-job-server.enabled=false

# Sentry must be disabled in tests — no DSN means no-op hub.
sentry.dsn=

# Shopify OAuth — known values for HMAC computation in integration tests.
shopify.client-id=test-client-id
shopify.client-secret=test-shopify-secret-32-bytes-abc!!
shopify.webhook-base-url=http://localhost:8080
