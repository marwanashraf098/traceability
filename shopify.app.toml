# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "dbed84aaa76b5df84ff40c19fb112dfb"
application_url = "https://app.tracedtech.com/"
embedded = true
name = "Trace"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_fulfillments,read_orders,read_products"
optional_scopes = [ ]
use_legacy_install_flow = true

[auth]
redirect_urls = [ "https://app.tracedtech.com/auth/shopify/callback" ]

[webhooks]
api_version = "2026-04"

# GDPR mandatory webhooks — required for Shopify app review.
# URLs match ShopifyWebhookController endpoints.
[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/shopify/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/shopify/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shopify/shop/redact"
