###############################################################################
# nginx.conf — Traced production reverse proxy
#
# Role: TLS termination + reverse proxy to the Spring Boot app container.
# Cloudflare free edge sits in front; nginx trusts CF for real-IP extraction.
#
# Cert assumption: Let's Encrypt via certbot on the HOST.
#   Certs at: /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
#             /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
#   Replace YOUR_DOMAIN with the actual domain before first deploy.
#
# Update Cloudflare IP ranges when they change:
#   https://www.cloudflare.com/ips/
###############################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $request_id [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cf_ray=$http_cf_ray';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    # Do NOT gzip application/pdf or application/octet-stream — already binary-compressed.

    # ── Body size ─────────────────────────────────────────────────────────────
    # AWB PDFs arrive as base64 (~55 KB per label), Shopify webhooks are a few KB.
    # 10 MB is generous and safe; raise only if bulk-AWB batch endpoints are added.
    client_max_body_size 10m;

    # ── Cloudflare real-IP ────────────────────────────────────────────────────
    # Cloudflare terminates TLS at the edge and forwards traffic from these ranges.
    # nginx must trust them so $remote_addr reflects the real visitor IP, not CF.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # CF-Connecting-IP contains the real visitor IP when Cloudflare is the proxy.
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream app {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name YOUR_DOMAIN;

        # Certbot HTTP-01 challenge — must stay on port 80
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name YOUR_DOMAIN;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ─────────────────────────────────────────────────
        # HSTS: 1-year, include subdomains, preload-ready.
        # Do not add preload until you are sure ALL subdomains are HTTPS.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP is intentionally permissive here — tighten per your SPA's needs.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

        # ── Proxy to Spring Boot app ─────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # Standard forwarded headers — app uses these for URL generation + audit logs.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            # Preserve or generate the correlation ID.
            # CorrelationIdFilter in the app will accept this if present, or generate one.
            proxy_set_header   X-Request-Id      $request_id;

            # Pass Cloudflare ray ID through for joint log correlation.
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header   CF-Ray            $http_cf_ray;

            # Timeouts: generous for label/PDF generation and Shopify/Bosta API calls.
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            proxy_buffering on;
            proxy_buffer_size    16k;
            proxy_buffers        8 16k;
        }

        # ── Webhook endpoints — explicit note ────────────────────────────────
        # POST /api/v1/webhooks/bosta and POST /api/v1/webhooks/shopify are matched
        # by the catch-all location / above.  No special config needed; they pass
        # through with the same body-size limit (10m) and timeout (60s).
        # If Shopify ever sends bodies > 10m (bulk data export), raise client_max_body_size.

        # ── Health endpoint — accessible for load-balancer probes ────────────
        location /actuator/health {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
