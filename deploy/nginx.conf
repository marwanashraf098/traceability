###############################################################################
# nginx.conf — Traced production reverse proxy
#
# Role: TLS termination + reverse proxy to the Spring Boot app container.
# Cloudflare free edge sits in front; nginx trusts CF for real-IP extraction.
#
# Cert assumption: Let's Encrypt via certbot on the HOST.
#   Certs at: /etc/letsencrypt/live/app.tracedtech.com/fullchain.pem
#             /etc/letsencrypt/live/app.tracedtech.com/privkey.pem
#   Replace app.tracedtech.com with the actual domain before first deploy.
#
# Update Cloudflare IP ranges when they change:
#   https://www.cloudflare.com/ips/
###############################################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $request_id [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cf_ray=$http_cf_ray';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    # Do NOT gzip application/pdf or application/octet-stream — already binary-compressed.

    # ── Body size ─────────────────────────────────────────────────────────────
    # AWB PDFs arrive as base64 (~55 KB per label), Shopify webhooks are a few KB.
    # 10 MB is generous and safe; raise only if bulk-AWB batch endpoints are added.
    client_max_body_size 10m;

    # ── Cloudflare real-IP ────────────────────────────────────────────────────
    # Cloudflare terminates TLS at the edge and forwards traffic from these ranges.
    # nginx must trust them so $remote_addr reflects the real visitor IP, not CF.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    # CF-Connecting-IP contains the real visitor IP when Cloudflare is the proxy.
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── Rate-limiting zones ───────────────────────────────────────────────────
    # Applied to /api/ only. Static assets are excluded by a dedicated location
    # block so the browser's parallel asset-load burst never trips this limit.
    # $binary_remote_addr resolves to the real visitor IP after set_real_ip_from
    # strips the Cloudflare edge address above.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream app {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name app.tracedtech.com;

        # Certbot HTTP-01 challenge — must stay on port 80
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.tracedtech.com;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/app.tracedtech.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.tracedtech.com/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ─────────────────────────────────────────────────
        # HSTS: 1-year, include subdomains, preload-ready.
        # Do not add preload until you are sure ALL subdomains are HTTPS.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP is intentionally permissive here — tighten per your SPA's needs.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self';" always;

        # ── Favicon ──────────────────────────────────────────────────────────
        # Vite produces an SVG logo; no favicon.ico file is served by the app.
        # Return empty 204 to silence the browser's automatic /favicon.ico probe
        # (was returning 500 — Spring's error dispatcher, no matching handler).
        location = /favicon.ico {
            return 204;
            access_log off;
        }

        # ── Embedded Shopify App Bridge shell ─────────────────────────────────
        # /embedded and /embedded.html are loaded inside the Shopify admin iframe.
        # They MUST NOT carry X-Frame-Options: DENY (which the server block sets).
        # Because this location defines its own add_header directives, the server-
        # level add_header directives (including DENY) are NOT inherited here.
        # Spring Security also adds X-Frame-Options: DENY from the upstream —
        # proxy_hide_header strips that before it reaches the browser.
        # The frame-ancestors CSP is the authoritative framing policy; it restricts
        # framing to Shopify admin only (no X-Frame-Options means frameable by all
        # origins without the CSP, so the CSP is REQUIRED here).
        location ^~ /embedded {
            proxy_hide_header  X-Frame-Options;

            # Re-add security headers (not inherited because this block has add_header).
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            # Allow Shopify admin to iframe this path; deny all other origins.
            add_header Content-Security-Policy "frame-ancestors https://admin.shopify.com https://*.myshopify.com;" always;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection          "";
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   X-Request-Id        $request_id;
            proxy_set_header   CF-Connecting-IP    $http_cf_connecting_ip;
            proxy_set_header   CF-Ray              $http_cf_ray;
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
            proxy_buffering on;
            proxy_buffer_size    16k;
            proxy_buffers        8 16k;
        }

        # ── Static assets (Vite build output) ─────────────────────────────
        # ROOT CAUSE OF BLANK PAGE: Vite's production HTML adds the `crossorigin`
        # attribute to every <script type="module"> and <link rel="stylesheet">.
        # This causes the browser to send Origin: https://app.tracedtech.com on
        # every asset fetch, even though page and assets share the same host.
        # Spring Security's CorsFilter checks the Origin against the configured
        # allowedOriginPatterns. In production those patterns only cover localhost
        # and an unresolved "${CORS_ALLOWED_ORIGINS:}" literal — so the check fails
        # and the filter returns 403 with an empty body (no Content-Type).
        # The browser sees an empty MIME type and refuses to apply the stylesheet.
        # A single `curl -I` does not send Origin, bypasses the CORS filter, and
        # returns 200 — which is why the curl test succeeded but the browser didn't.
        #
        # FIX: strip the Origin header before proxying asset requests. With no
        # Origin present the CorsFilter is a no-op; Spring's permitAll() for
        # /assets/** takes over and the static resource handler serves 200+type.
        # No rate limiting here — assets must survive the browser's parallel burst.
        location /assets/ {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection          "";
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   X-Request-Id        $request_id;
            proxy_set_header   CF-Connecting-IP    $http_cf_connecting_ip;
            proxy_set_header   CF-Ray              $http_cf_ray;
            # Strip Origin — static assets require no CORS negotiation.
            proxy_set_header   Origin              "";

            proxy_buffering on;
            proxy_buffer_size    16k;
            proxy_buffers        8 16k;
        }

        # ── API (rate-limited) ─────────────────────────────────────────────
        # 20 r/s sustained, 30-request burst served immediately (nodelay).
        # Returns 429 (not nginx's default 503) for requests above the limit.
        # Does NOT cover /assets/ or webhook paths — those use other blocks.
        location /api/ {
            limit_req        zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection          "";
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   X-Forwarded-Host    $host;
            proxy_set_header   X-Request-Id        $request_id;
            proxy_set_header   CF-Connecting-IP    $http_cf_connecting_ip;
            proxy_set_header   CF-Ray              $http_cf_ray;
            # Strip Origin — SPA calls /api/ same-origin; Spring's broken CORS
            # allow-list rejects the browser's Origin header with 403.
            # Webhooks (Shopify/Bosta) don't send Origin, so this is a no-op for them.
            proxy_set_header   Origin              "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            proxy_buffering on;
            proxy_buffer_size    16k;
            proxy_buffers        8 16k;
        }

        # ── Proxy to Spring Boot app ─────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # Standard forwarded headers — app uses these for URL generation + audit logs.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            # Preserve or generate the correlation ID.
            # CorrelationIdFilter in the app will accept this if present, or generate one.
            proxy_set_header   X-Request-Id      $request_id;

            # Pass Cloudflare ray ID through for joint log correlation.
            proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
            proxy_set_header   CF-Ray            $http_cf_ray;

            # Timeouts: generous for label/PDF generation and Shopify/Bosta API calls.
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            proxy_buffering on;
            proxy_buffer_size    16k;
            proxy_buffers        8 16k;
        }

        # ── Webhook endpoints — explicit note ────────────────────────────────
        # POST /api/v1/webhooks/bosta   → matched by location /api/ above (rate-limited; fine).
        # POST /webhooks/shopify/**     → matched by location / catch-all (no rate limit).
        # Both pass through with the 10m body-size limit and 60s timeouts.
        # If Shopify ever sends bodies > 10m (bulk data export), raise client_max_body_size.

        # ── Health endpoint — accessible for load-balancer probes ────────────
        location /actuator/health {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
