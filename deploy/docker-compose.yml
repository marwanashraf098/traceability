services:

  # ── Spring Boot application ────────────────────────────────────────────────
  # Postgres is NOT in this stack — the app connects OUT to Supabase
  # (session-mode pooler at aws-0-eu-west-1.pooler.supabase.com:5432).
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: traceability-app:latest
    env_file: ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - internal
    # Port NOT published to host — nginx is the only ingress.

  # ── Nginx TLS-terminating reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx config
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certs issued by certbot on the HOST before first compose up.
      # See ../docs/DEPLOY-NOTES.md for the certbot command.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot HTTP-01 challenge webroot
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
